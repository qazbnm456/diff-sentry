name: CI

# Offline suite only: no live LLM, no network calls in tests, no Deno sandbox — dspy-bearing paths use
# DummyLM / rlm-kit's ScriptedInterpreter, transports are injected fakes, and the corpus pins the
# indicator suite's hit/miss behavior (see CLAUDE.md "Verify"). `uv sync` pulls rlm-kit from GitHub
# (uv.lock pins the exact commit).
on:
  push:
    branches: [main]
  pull_request:

# Least privilege: this workflow only checks out code and runs tests/lint — it never writes. Specifying
# `permissions:` also drops every unlisted scope to `none`, so a compromised dep/action on an untrusted
# fork PR can't use the token to push, tag, or open issues.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # 3.11 is the requires-python floor; 3.13 is what .python-version / local dev actually runs.
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        # Third-party action pinned to a commit SHA for supply-chain integrity (a moving major tag
        # could be repointed at malicious code that runs with this workflow's token). GitHub-owned
        # actions (checkout) stay on a major tag. Bump the SHA and the trailing version comment together.
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true

      # --all-packages brings in the studio workspace member, --all-extras every optional surface
      # (classify/observe/subscription + the studio dev extra) so both suites resolve in one env.
      - name: Sync (core + studio workspace)
        run: uv sync --all-extras --all-packages --python ${{ matrix.python-version }}

      - name: Core tests (pipeline + wiring)
        run: uv run --python ${{ matrix.python-version }} python -m pytest

      - name: Studio console tests
        run: uv run --python ${{ matrix.python-version }} python -m pytest studio/tests

      # The studio frontend's pure/factory cores (run-core, replay-core, trajectory) carry assert-based
      # node tests; the ubuntu runner ships node, so gate them here too.
      - name: Frontend core unit tests (node)
        run: |
          for f in studio/tests/*.test.js; do echo "▸ $f"; node "$f"; done

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
      - name: Lint
        run: uvx ruff check .
